# ═══════════════════════════════════════════════════════════════════════════════
#  OreoEssentials – Chat Format Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# ALL formats use MiniMessage syntax (https://docs.advntr.dev/minimessage/)
#
# Available placeholders in chat formats:
#   <lp_prefix>          – LuckPerms prefix (handles &color and §color codes)
#   <lp_suffix>          – LuckPerms suffix
#   <player_name>        – Player's username
#   <player_displayname> – Player's display name
#   <chat_message>       – The typed message (safe, prevents MiniMessage injection)
#   <server_name>        – Server name
#   <player_world>       – World name
#   <player_health>      – Current health
#   <player_max_health>  – Max health
#   <player_level>       – XP level
#   <player_ping>        – Ping (ms)
#   <player_gamemode>    – Game mode
#   <time_24h>           – Time HH:mm:ss
#   <date>               – Date yyyy-MM-dd
#   %papi_placeholder%   – Any PlaceholderAPI placeholder
#
# Players with permission "oreo.chat.colors" can use MiniMessage color tags
# in their own messages (e.g. <red>hello).
#
# [item] in a message is replaced with a hoverable item display.
# ═══════════════════════════════════════════════════════════════════════════════

chat:
  enabled: true
  strip-name-colors: false
  use-minimessage: true
  minimessage-translate-legacy-amp: true

  papi:
    apply-to-format: true
    apply-to-message: false  # Keep false – prevents PAPI injection from player input

  # ── Per-group / default format (used when channels are DISABLED) ─────────────
  # Format for each LuckPerms group: chat.<group_name>: "..."
  # Falls back to chat.default if group not found.

  default: "<lp_prefix><white><player_name></white> <dark_gray>»</dark_gray> <white><chat_message></white>"

  # Examples for specific groups:
  # admin: "<red><bold>[Admin]</bold></red> <lp_prefix><gold><player_name></gold> <dark_gray>»</dark_gray> <white><chat_message></white>"
  # vip:   "<gold>[VIP]</gold> <lp_prefix><yellow><player_name></yellow> <dark_gray>»</dark_gray> <white><chat_message></white>"

  # ── Discord bridge (non-channel mode) ──────────────────────────────────────
  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/REPLACE_ME"

  # ── Hover card (shown when hovering over player name in chat) ───────────────
  hover:
    enabled: true
    lines:
      - "<gradient:#FFD700:#FFA500><bold>%player_name%</bold></gradient>"
      - ""
      - "<gray>━━━━━━━━━━━━━━━━━━━━</gray>"
      - "<gold>⚔ Stats</gold>"
      - "  <red>❤</red> Health: <white>%player_health%/%player_max_health%</white>"
      - "  <green>✦</green> Level: <white>%player_level%</white>"
      - "  <aqua>⚡</aqua> Ping: <white>%player_ping%ms</white>"
      - ""
      - "<gold>🌍 Location</gold>"
      - "  <gray>World:</gray> <white>%player_world%</white>"
      - "  <gray>Coords:</gray> <white>%player_x%, %player_y%, %player_z%</white>"
      - ""
      - "<gold>👤 Info</gold>"
      - "  <gray>Rank:</gray> <white>%luckperms_primary_group%</white>"
      - "  <gray>Mode:</gray> <white>%player_gamemode%</white>"
      - ""
      - "<gray>━━━━━━━━━━━━━━━━━━━━</gray>"

  # ── Item-in-chat ([item] placeholder) ──────────────────────────────────────
  item-in-chat:
    enabled: true
    placeholder: "[item]"
    empty-hand-text: "<gray>[Air]</gray>"

  # ── Channel system ──────────────────────────────────────────────────────────
  channels:
    enabled: true
    default_channel: "global"
    remember_last_channel: true

    cross_server:
      enabled: false  # Set true + configure MongoDB in config.yml for cross-server channels

    formatting:
      enabled: true
      fallback_format: "<gray><player_name></gray><dark_gray>: </dark_gray><white><chat_message></white>"

    gui:
      title: "<gold>Oreo Channels</gold>"
      rows: 4
      fill_empty_with_glass: true

    list_order:
      - "global"
      - "announcements"
      - "trade"
      - "local"
      - "staff"
      - "help"

    channel_definitions:

      # ════════════════════════ GLOBAL ════════════════════════
      global:
        enabled: true
        display_name: "<gradient:#FF1493:#00FF7F>Global</gradient>"
        description: "<gray>Server-wide chat</gray>"

        talk_permission: null   # null = everyone can talk
        view_permission: null
        join_permission: null

        scope:
          type: "ALL"
          range_blocks: 0

        formatting:
          enabled: true
          # Full format including player name, prefix, and message:
          format: "<gray>[<gradient:#FF1493:#00FF7F>G</gradient>]</gray> <lp_prefix><white><player_name></white><dark_gray>: </dark_gray><white><chat_message></white>"

          rank_formats:
            # "default" is the fallback for any rank not explicitly listed below.
            # Remove or comment it out if you want the base channel format for default players.
            default: "<gray>[<gradient:#FF1493:#00FF7F>G</gradient>]</gray> <white><player_name></white><dark_gray>: </dark_gray><white><chat_message></white>"
            vip:   "<gold>[<white>★</white> G]</gold> <lp_prefix><gold><player_name></gold><dark_gray>: </dark_gray><yellow><chat_message></yellow>"
            mvp:   "<gradient:#ffd700:#ff8c00>[<white>✦</white> G]</gradient> <lp_prefix><gradient:#ffd700:#ff8c00><player_name></gradient><dark_gray>: </dark_gray><white><chat_message></white>"
            admin: "<red>[<yellow>⚡</yellow> G]</red> <lp_prefix><red><player_name></red><dark_gray>: </dark_gray><white><chat_message></white>"
            owner: "<gradient:#8e2de2:#4a00e0>[<white>♔</white> G]</gradient> <lp_prefix><gradient:#8e2de2:#4a00e0><player_name></gradient><dark_gray>: </dark_gray><white><chat_message></white>"

        join_message: "<gray>You are now chatting in </gray><gradient:#FF1493:#00FF7F>Global</gradient><gray>!</gray>"
        discord_webhook: null

      # ════════════════════════ ANNOUNCEMENTS (read-only) ════════════════════
      announcements:
        enabled: true
        display_name: "<gold><bold>📢 Announcements</bold></gold>"
        description: "<gray>Official server announcements (read-only)</gray>"

        talk_permission: "oreo.chat.channel.announcements.talk"
        view_permission: null
        join_permission: null

        scope:
          type: "ALL"
          range_blocks: 0

        formatting:
          enabled: true
          format: "<gold><bold>[📢]</bold></gold> <lp_prefix><gold><player_name></gold><dark_gray>: </dark_gray><white><chat_message></white>"

          rank_formats:
            admin: "<gold><bold>[📢 Admin]</bold></gold> <lp_prefix><gold><player_name></gold><dark_gray>: </dark_gray><white><chat_message></white>"
            owner: "<gradient:#ffd700:#ff8c00><bold>[📢 Owner]</bold></gradient> <lp_prefix><gradient:#ffd700:#ff8c00><player_name></gradient><dark_gray>: </dark_gray><white><chat_message></white>"

        join_message: "<gray>You are viewing </gray><gold><bold>Announcements</bold></gold><gray>. This channel is </gray><red>read-only</red><gray>.</gray>"
        discord_webhook: null

      # ════════════════════════ LOCAL ════════════════════════
      local:
        enabled: true
        display_name: "<yellow>Local</yellow>"
        description: "<gray>Talk to nearby players (100 blocks)</gray>"

        talk_permission: null
        view_permission: null
        join_permission: null

        scope:
          type: "RANGE"
          range_blocks: 100

        formatting:
          enabled: true
          format: "<yellow>[L]</yellow> <lp_prefix><white><player_name></white><dark_gray>: </dark_gray><yellow><chat_message></yellow>"

          rank_formats:
            vip:   "<gold>[L+]</gold> <lp_prefix><gold><player_name></gold><dark_gray>: </dark_gray><yellow><chat_message></yellow>"
            admin: "<red>[ADMIN-L]</red> <lp_prefix><red><player_name></red><dark_gray>: </dark_gray><white><chat_message></white>"

        join_message: "<gray>You are now chatting in </gray><yellow>Local</yellow><gray> (100 blocks range)</gray>"
        discord_webhook: null

      # ════════════════════════ TRADE ════════════════════════
      trade:
        enabled: true
        display_name: "<green>Trade</green>"
        description: "<gray>Buy and sell items</gray>"

        talk_permission: null
        view_permission: null
        join_permission: null

        scope:
          type: "ALL"
          range_blocks: 0

        formatting:
          enabled: true
          format: "<green>[<gold>$</gold>T]</green> <lp_prefix><white><player_name></white><dark_gray>: </dark_gray><green><chat_message></green>"

          rank_formats:
            vip: "<gold>[<white>💰</white> VIP Trade]</gold> <lp_prefix><gold><player_name></gold><dark_gray>: </dark_gray><yellow><chat_message></yellow>"
            mvp: "<gradient:#ffd700:#ff8c00>[<white>💎</white> MVP Trade]</gradient> <lp_prefix><gradient:#ffd700:#ff8c00><player_name></gradient><dark_gray>: </dark_gray><white><chat_message></white>"

        join_message: "<gray>You are now in </gray><green>Trade</green><gray> channel. Buy & sell here!</gray>"
        discord_webhook: null

      # ════════════════════════ STAFF ════════════════════════
      staff:
        enabled: true
        display_name: "<red>Staff</red>"
        description: "<gray>Staff-only channel</gray>"

        talk_permission: "oreo.chat.channel.staff.talk"
        view_permission: "oreo.chat.channel.staff.view"
        join_permission: "oreo.chat.channel.staff.join"

        scope:
          type: "ALL"
          range_blocks: 0

        formatting:
          enabled: true
          format: "<dark_red><bold>[STAFF]</bold></dark_red> <lp_prefix><red><player_name></red><dark_gray>: </dark_gray><white><chat_message></white>"

          rank_formats:
            moderator: "<aqua><bold>[MOD]</bold></aqua> <lp_prefix><aqua><player_name></aqua><dark_gray>: </dark_gray><white><chat_message></white>"
            admin:     "<red><bold>[ADMIN]</bold></red> <lp_prefix><red><player_name></red><dark_gray>: </dark_gray><white><chat_message></white>"
            owner:     "<gradient:#8e2de2:#4a00e0><bold>[OWNER]</bold></gradient> <lp_prefix><gradient:#8e2de2:#4a00e0><player_name></gradient><dark_gray>: </dark_gray><white><chat_message></white>"

        join_message: "<gray>You are now in </gray><red><bold>Staff Chat</bold></red><gray>!</gray>"
        discord_webhook: null

      # ════════════════════════ HELP ════════════════════════
      help:
        enabled: true
        display_name: "<aqua>Help</aqua>"
        description: "<gray>Ask for help from staff</gray>"

        talk_permission: null
        view_permission: null
        join_permission: null

        scope:
          type: "ALL"
          range_blocks: 0

        formatting:
          enabled: true
          format: "<aqua>[<white>?</white>]</aqua> <lp_prefix><white><player_name></white><dark_gray>: </dark_gray><aqua><chat_message></aqua>"

          rank_formats:
            helper:    "<green>[<white>✓</white> Helper]</green> <lp_prefix><green><player_name></green><dark_gray>: </dark_gray><white><chat_message></white>"
            moderator: "<aqua>[<white>✓</white> Mod]</aqua> <lp_prefix><aqua><player_name></aqua><dark_gray>: </dark_gray><white><chat_message></white>"
            admin:     "<red>[<white>✓</white> Admin]</red> <lp_prefix><red><player_name></red><dark_gray>: </dark_gray><white><chat_message></white>"

        join_message: "<gray>You are now in </gray><aqua>Help</aqua><gray> channel. Ask your questions!</gray>"
        discord_webhook: null

# ── Cross-server RabbitMQ (for chat sync between servers) ───────────────────
MongoDB_rabbitmq:
  enabled: false
  rabbitmq:
    uri: "amqp://guest:guest@localhost:5672/"