tab:
  enabled: true
  use-placeholderapi: true
  interval-ticks: 2
  layout-mode: CUSTOM

  network:
    all-servers: true
    # Servers whose players are hidden from the tab list of other servers.
    # Use the exact server name as registered in your proxy (case-insensitive).
    excluded-servers:
      - hub

  custom-layout:
    enabled: true
    change-interval: 1 # Smooth flowing animation!

    top-section:
      texts:
        - |-
          <#9827F5>◀<gradient:#7D2D9D:#F179B5>------------------</gradient> <gold>◈ <gradient:#F179B5:#7D2D9D>------------------</gradient><#9827F5>▶<reset>
          <gradient:#7D2D9D:#F179B5>Mythical Lunar Abyss</gradient>
          &f
    player-section:
      enabled: true
      player-format:
        format: '%luckperms_prefix%%player_displayname%%afk_indicator%'
        rank-colors:
          admin: '&b' # Aqua
          default: '&f' # White
        show-afk: true
        afk-format: ' &7AFK'
        show-ping-bars: true

