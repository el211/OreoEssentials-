tab:
  enabled: true
  use-placeholderapi: true
  interval-ticks: 20
  layout-mode: CUSTOM

  network:
    all-servers: true

  # ====================================================================
  # 🌊 OREOESSENTIALS BLUE GRADIENT FLOWING WAVES! 🌊
  # Matches the circular wave logo design
  # ====================================================================
  custom-layout:
    enabled: true
    change-interval: 8 # Smooth flowing animation!

    # ====================================================================
    # 🌊 ANIMATED FLOWING BLUE WAVE HEADER
    # ====================================================================
    top-section:
      texts:
        - |-
          &d &d
          &d &d
        - |-
          &d &d
          &d &d
    player-section:
      enabled: false
      player-format:
        format: '%player_color%%player_name%%afk_indicator%'
        rank-colors:
          gerant: '&9' # Dark Blue
          admin: '&b' # Aqua
          moderator: '&3' # Dark Aqua
          helper: '&e' # Yellow
          vip: '&b' # Aqua
          default: '&f' # White
        show-afk: true
        afk-format: ' &7AFK'
        show-ping-bars: true

    # ====================================================================
    # ANIMATED FLOWING BLUE WAVE FOOTER
    # ====================================================================

    bottom-section:
      texts:
        - |-
          &d &d
          &#EAE21B☆ &#55ABE5&lN&#56B4E4&lo&#57BDE3&lu&#57C6E2&ls &#58CFE1&ls&#59D8E0&lo&#5AE1DF&lm&#5AEADE&lm&#5BF3DD&le&#5CFCDC&ls &#2CCAF7&l%oe_network_online% &#5CFCDC&lc&#5BF2DD&lo&#5AE8DE&ln&#59DEDF&ln&#59D4E1&le&#58C9E2&lc&#57BFE3&lt&#56B5E4&lé&#55ABE5&ls &#EAE21B☆
          &d &d
        - |-
          &d &d
          &#EAE21B☆ &#55ABE5&lN&#56B4E4&lo&#57BDE3&lu&#57C6E2&ls &#58CFE1&ls&#59D8E0&lo&#5AE1DF&lm&#5AEADE&lm&#5BF3DD&le&#5CFCDC&ls &#2CCAF7&l%oe_network_online% &#5CFCDC&lc&#5BF2DD&lo&#5AE8DE&ln&#59DEDF&ln&#59D4E1&le&#58C9E2&lc&#57BFE3&lt&#56B5E4&lé&#55ABE5&ls &#EAE21B☆
          &d &d
    sorting:
      method: RANK
      rank-priority:
        gerant: 120
        admin: 110
        staff: 100

        suzerain: 95
        doyen: 90
        legende: 85
        mecene: 80
        emerite: 75

        gardien: 70
        prodige: 65
        specialiste: 60
        protecteur: 55

        élu: 50
        champion: 45
        heros: 40

        expert: 35
        maitre: 30
        initie: 25
        adepte: 20
        disciple: 15

        default: 10

  title:
    enabled: false
    show-on-join: false
    text: '&9&lOREO&b&lESSENTIALS'
    subtitle: '&7Welcome &b%player_displayname%&7!'
    fade-in: 10
    stay: 60
    fade-out: 10

  name-format:
    enabled: true
    use-rank-formats: true
    rank-key: '%luckperms_primary_group%'
    server-tag: ' &8(&9%server_name%&8)'
    pattern: '&f%nick_or_name%%oe_server_tag%'
    rank-formats:
      default: <#8FEBDE> %mcmmo_power_level% <gray>• <reset>%eternaltags_tag%<reset>
        <gray>| <reset>%luckperms_prefix% <#7EACA3>%nick_or_name%

      disciple: <#8FEBDE> %mcmmo_power_level% <gray>• <reset>%eternaltags_tag%<reset>
        <gray>| <reset>%luckperms_prefix% <#7EF1A7>%nick_or_name%

      adepte: <#8FEBDE> %mcmmo_power_level% <gray>• <reset>%eternaltags_tag%<reset>
        <gray>| <reset>%luckperms_prefix% <#DDC55D>%nick_or_name%

      initie: <#8FEBDE> %mcmmo_power_level% <gray>• <reset>%eternaltags_tag%<reset>
        <gray>| <reset>%luckperms_prefix% <#22AEBF>%nick_or_name%

      maitre: <#8FEBDE> %mcmmo_power_level% <gray>• <reset>%eternaltags_tag%<reset>
        <gray>| <reset>%luckperms_prefix% <#EC5D29>%nick_or_name%

      expert: <#8FEBDE> %mcmmo_power_level% <gray>• <reset>%eternaltags_tag%<reset>
