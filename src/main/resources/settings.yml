features:

  world-sharding:
    enabled: false  # Set to true when ready to use

  bossbar:
    enabled: false  # Replaced by MultiBossBarService in custom-nameplates/config.yml

  chat:
    enabled: true
    discord-bridge: true
    banned-words:
      enabled: true
      list:
        - "badword"
        - "anotherbadword"
        - "insult"
  home:
    enabled: true

    cooldown: false
    cooldown-amount: 5

  shop:
    enabled: true

  currency:
    enabled: true
  economy:
    enabled: true

  jumppads:
    enabled: true

  kits:
    enabled: true
    register-commands: true

  mobs:
    enabled: true
    healthbar: true

  clearlag:
    enabled: true   # Master switch for ClearLag module (/olagg, auto clear, TPS monitor)

  oreoholograms:
    enabled: true

    per-player: true        # enable per-player placeholders/permissions for TEXT holograms
  holograms:
    text:
      per-player: true
  playervaults:
    enabled: true

  playtime-rewards:
    enabled: true

  portals:
    enabled: true

  rtp:
    enabled: true

    warmup: true
    warmup-amount: 5

  scoreboard:
    enabled: true

  help:
    enabled: true

  sit:
    enabled: true

  tempfly:
    enabled: true

  trade:
    enabled: true
    cross-server: true

  discord-moderation:
    enabled: true

  cross-server:
    homes: true
    warps: true
    spawn: true
    economy: true
    enderchest: true
    inventory: true
    invsee: true
    vanish: true

  tab:
    enabled: true

  playerwarps:
    enabled: true        # turn /pw on/off
    cross-server: true   # only effective when essentials.storage = mongodb

    features:
      description: true
      rating: true
      categories: true
      cost: true
      whitelist: true
      managers: true
      favourites: true
      password: true
      lock: true
      rtp: true
      gui: true

    limit:
      default: 3
      vip: 10
      mvp: 25

  tpa:
    cooldown: true #false
    cooldown-amount: 5 # in sec
  warp:
    cooldown: true #false
    cooldown-amount: 5 # in sec

  spawn:
    cooldown: true        # Enable/disable spawn countdown
    cooldown-amount: 5    # Seconds before teleport; 0 or negative = instant


  first-join-spawn:
    enabled: true   # Teleport new players to spawn on their very first connection

  death-respawn:
    enabled: true
    # NORMAL        -> vanilla behavior
    # GLOBAL_SPAWN  -> uses SpawnService.getSpawn() (same as /spawn)
    # WORLD_SPAWN   -> current world's spawn
    # CUSTOM        -> fixed location (with optional per-world overrides)
    mode: GLOBAL_SPAWN
    respect-bed-anchor: true

    # Used only when mode: CUSTOM
    custom:
      world: "world"
      x: 0.5
      y: 64.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0

    # Optional per-world overrides (only for mode: CUSTOM)
    per-world:
      world_nether:
        world: "world_nether"
        x: 10.5
        y: 65.0
        z: 10.5
        yaw: 180.0
        pitch: 0.0

auto-reboot:
  enabled: false
  mode: "TIME" # TIME or INTERVAL
  timezone: "Europe/Paris" # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  time: "00:00"
  interval-minutes: 360
  broadcast: true
  warnings: [300, 60, 30, 10, 5, 4, 3, 2, 1]
  pre-commands: []
  kick-message: "<red>Server is restarting. Please reconnect in a moment.</red>"


  action: "SAFE_ZONE" # KICK or SAFE_ZONE

  safe-zone:
    enabled: true
    delay-seconds: 3
    world-name: "world"
    region-name: "reboot_safe"
    server: "" # if not empty -> send to this server instead of local teleport
    message: "<yellow>Server is rebooting. You have been moved to a safe area.</yellow>"


maintenance:
  enabled: true  # Enable/disable the entire maintenance system

holograms:
  text:
    per-player: true        # enable per-player placeholders/permissions for TEXT holograms

# Nametag, chat bubbles and action bar are configured in:
# plugins/OreoEssentials/custom-nameplates/config.yml

performance:
  ui-safeguards:
    enabled: false
    server-names: []   # Example: [ "survival-1", "survival-2", "prison" ]
    disable:
      scoreboard: false
      tab: false
      bossbar: false
      nametag: false
      chat-bubbles: false
      actionbar: false
      multi-bossbar: false

  join-flood-protection:
    enabled: true
    window-ms: 10000
    ui-soft-joins-per-window: 8
    base-ui-delay-ticks: 10
    extra-ui-delay-ticks: 10
    max-ui-delay-ticks: 100
    login-rate-limit:
      enabled: true
      max-logins-per-window: 20
      kick-message: "<red>Join queue is active. Please reconnect in a moment.</red>"

  container-spam-guard:
    enabled: true
    window-ms: 1250
    max-score-per-window: 40
    shift-click-weight: 6
    transfer-weight: 4
    drag-slot-weight: 2
    close-inventory-on-trip: true
    kick-after-strikes: 3
    warn-cooldown-ms: 2000
    warn-message: "<red>Container actions are being rate-limited. Slow down.</red>"
    kick-message: "<red>You are sending too many container actions.</red>"

  # ──────────────────────────────────────────────────────────────────────────
  # UI-SAFEGUARD PROFILES — copy the block you need into ui-safeguards above
  # ──────────────────────────────────────────────────────────────────────────
  #
  # PROFILE A — Normal shards (< 100 players)
  # No safeguards needed. Leave ui-safeguards.enabled: false.
  # Tune nametag in custom-nameplates/config.yml:
  #   nametag:
  #     visibility-sweep-batch-owners: 8
  #     move-visibility-cooldown-ticks: 5
  #     position-interval-ticks: 2
  #     update-interval-ticks: 40
  #
  # PROFILE B — Heavy shards (200–300 players)
  #   ui-safeguards:
  #     enabled: true
  #     server-names: [ "your-heavy-shard" ]
  #     disable:
  #       multi-bossbar: true
  #       chat-bubbles: true
  #       scoreboard: false
  #       tab: false
  #       bossbar: false
  #       nametag: false
  #       actionbar: false
  # Tune nametag in custom-nameplates/config.yml:
  #   nametag:
  #     visibility-sweep-batch-owners: 4
  #     move-visibility-cooldown-ticks: 10
  #     position-interval-ticks: 4
  #     update-interval-ticks: 60
  #
  # PROFILE C — Very high pop shards (500+ players)
  #   ui-safeguards:
  #     enabled: true
  #     server-names: [ "your-500-shard" ]
  #     disable:
  #       nametag: true
  #       chat-bubbles: true
  #       multi-bossbar: true
  #       actionbar: true
  #       scoreboard: false   # kept on — render-state cached, low cost
  #       tab: false          # kept on — PlaceholderAPI reflection cached
  #       bossbar: false
  # ──────────────────────────────────────────────────────────────────────────

