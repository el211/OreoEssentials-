      material: GREEN_WOOL
      name: "&a&l✔ CONFIRMER L'ACHAT"
    cancel:
      slot: 15
      material: RED_WOOL
      name: "&c&l✗ ANNULER"
    info:
      slot: 22
      material: PAPER
      name: "&e&lInformations sur l'achat"

# ─────────────────────────────────────
# Menu des articles vendus
# ─────────────────────────────────────
sold:
  title: "&a&lArticles vendus"
  border: GREEN_STAINED_GLASS_PANE
  buttons:
    prev-page:
      slot: 48
      material: ARROW
      name: "&e&lPrécédent"
    next-page:
      slot: 50
      material: ARROW
      name: "&e&lSuivant"
    back:
      slot: 49
      material: BARRIER
      name: "&c&lRetour"

# ─────────────────────────────────────
# Menu des annonces expirées
# ─────────────────────────────────────
expired:
  title: "&c&lAnnonces expirées"
  border: RED_STAINED_GLASS_PANE
  buttons:
    prev-page:
      slot: 48
      material: ARROW
      name: "&e&lPrécédent"
    next-page:
      slot: 50
      material: ARROW
      name: "&e&lSuivant"
    back:
      slot: 49
      material: BARRIER
      name: "&c&lRetour"
    reclaim-all:
      slot: 46
      material: CHEST
      name: "&a&lTout récupérer ({count})"
