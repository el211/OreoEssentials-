tab:
  enabled: true
  use-placeholderapi: true
  interval-ticks: 2
  layout-mode: CUSTOM

  network:
    all-servers: true
    # Servers whose players are hidden from the tab list of other servers.
    # Use the exact server name as registered in your proxy (case-insensitive).
