          <#9827F5>◀<gradient:#7D2D9D:#F179B5>------------------</gradient> <gold>◈ <gradient:#F179B5:#7D2D9D>------------------</gradient><#9827F5>▶<reset>
          <gradient:#7D2D9D:#F179B5>OreoEssentials</gradient>
          &f
