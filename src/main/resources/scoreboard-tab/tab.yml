      enabled: true
      player-format:
        format: '%luckperms_prefix%%player_displayname%%afk_indicator%'
        rank-colors:
          admin: '&b' # Aqua
          default: '&f' # White
        show-afk: true
        afk-format: ' &7AFK'
        show-ping-bars: true

