# ===========================
# OreoEssentials - config.yml
# ===========================
# Reorganized for clarity and maintainability
# Last updated: 2026-02-12

# ==================== CORE SERVER SETTINGS ====================
server:
  name: "survival-1"  # Unique logical name for THIS server
  language: en        # Options: en, fr, es, de, pt
# ==================== WEB PANEL ====================
# Set enabled: true and paste the api-key generated when you register your server on the OreoStudios panel.
# Players can run /weblink in-game to get a one-time login code instead of typing their UUID.
web-panel:
  enabled: false
  url: "https://oreostudios.fr"  # URL of your OreoStudios web panel
  api-key: ""    # Paste the key shown on the panel after registering your server

# ==================== FEATURE TOGGLES =====================
features:
  tpa:
    debug: false
    debug-echo-to-player: false

debug: false
placeholder-debug: false
tradedebug: true

nametag:
  debug: true
skins:
  debug: false

logging:
  debug: false

discord:
  link_backend: "file"   # or "mongodb" for cross-network
# ==================== STORAGE & DATABASE ====================

# Primary essentials data store (homes/warps/spawn/back)
essentials:
  storage: "yaml"  # Options: yaml | json | mongodb
  # yaml/json = local-only (no cross-server home directory)
  # mongodb   = enables cross-server home ownership + shared data

# MongoDB configuration (used when essentials.storage = mongodb)
storage:
  mongo:
    uri: "mongodb://localhost:27017"
    database: "oreo"
    collectionPrefix: "oreo_"
    # Collections created:
    #   - <prefix>homes
    #   - <prefix>warps
    #   - <prefix>meta
    #   - <prefix>home_directory (cross-server ownership)

# Economy system
economy:
  type: "json"  # Options: none | json | mongodb | postgresql

  # Balance configuration
  starting-balance: 100.0
  max-balance: 1000000000
  min-balance: 0.0
  allow-negative: false
  baltop-size: 10
  cheque:
    prefer-main-hand: true
    custom-model-data: 0

  # MongoDB economy backend (if type = mongodb)
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "minecraft_economy"
    collection: "balances"
    # Need MongoDB? Contact: https://discord.gg/A6wCGJD2Ez ($2/month)

  # PostgreSQL economy backend (if type = postgresql)
  postgresql:
    url: "jdbc:postgresql://localhost:5432/minecraft_economy"
    user: "postgres"
    password: "postgres211"
    table: "balances"



# Redis cache (optional)
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  cache-expiry: 600  # TTL in seconds

# ==================== NETWORK & CROSS-SERVER ====================

network:
  cross-server: true
  transport: "plugin_message"  # Server switching uses proxy plugin messaging

# RabbitMQ (optional - for ChatSync and home-teleport coordination)
rabbitmq:
  enabled: false
  uri: "amqps://user:pass@host/vhost"
  # Need RabbitMQ? Contact: https://discord.gg/A6wCGJD2Ez ($2/month)

# ==================== PLAYER FEATURES ====================

# Homes system
homes:
  maxPerPlayer: 5
  permissionBased: true  # If true, "oreo.homes.<N>" permission overrides max

# Teleport requests
tpa:
  timeoutSeconds: 60

# Inventory synchronization
invsee:
  allow-edit-while-online-elsewhere: true

# Player sync (default toggle states for new players)
playersync:
  inventory: true
  xp: true
  health: true
  hunger: true

# AFK system → configured in plugins/OreoEssentials/afk/config.yml

# Jail system
Jail:
  Storage:
    Mongo:
      Enabled: false  # Set true for cross-server jail sync
      Uri: "mongodb://localhost:27017"
      Database: "oreo"
      # Collections: "jails" and "jail_sentences" (auto-created)

# ==================== WORLD FEATURES ====================

# Portals
portals:
  cooldown_ms: 1000
  sound: "ENTITY_ENDERMAN_TELEPORT"
  particle: "PORTAL"
  particle_count: 20
  allow_keep_yaw_pitch: true
  teleport_async: false
  max_portal_volume: 100000

# Jump pads
jumpads:
  default_power: 1.2
  default_upward: 1.0
  default_useLookDir: true
  cooldown_ms: 800
  sound: "ENTITY_FIREWORK_ROCKET_LAUNCH"
  particle: "CLOUD"
  particle_count: 12

# Mob health bars
mobs:
  show-healthmobs: true
  healthbar:
    update-interval-ticks: 5
    view-distance: 32.0
    require-line-of-sight: true
    spawn-per-tick-cap: 40

    format:
      - "&f<name>"
      - "&c❤ <bar> &7(<current>/<max>)"

    show-numbers: true
    segments: 10
    full: "█"
    empty: "░"
    rounded: true
    left-edge: "❮"
    right-edge: "❯"

    color-full: "&a"
    color-mid: "&e"
    color-low: "&c"
    mid-threshold: 0.5
    low-threshold: 0.2

    include-passive: true
    include-players: false
    only-when-damaged: false

    line-offset: 0.35
    y-offset: 0.5
    use-mythicmobs: true

# World nicknames
world_nicknames:
  default: "UNKNOWN"
  map:
    world: "OVERWORLD"
    world_nether: "NETHER"
    world_the_end: "THE END"

# Player vaults configuration is now in: plugins/OreoEssentials/playervaults/config.yml
# Player warps configuration is now in:  plugins/OreoEssentials/playerwarps/config.yml
# Daily rewards configuration is now in: plugins/OreoEssentials/dailyrewards/dailyrewards.yml

# ==================== UI ELEMENTS ====================

# Boss bar is now configured in custom-nameplates/config.yml under bossbars:
# bossbar:
#   text: "<gradient:#FF1493:#00FF7F>Welcome</gradient> {player}"
#   color: PURPLE
#   style: SEGMENTED_10
#   progress: 1.0
#   update-ticks: 40

# Scoreboard is now configured in: plugins/OreoEssentials/scoreboard-tab/scoreboard.yml

# ==================== CHAT & MESSAGING ====================
# Join/quit messages, auto-messages, and Oreobot conversations are now
# configured in: plugins/OreoEssentials/chat-messaging/join-quit-messages.yml
# Chat format and channels are configured in: plugins/OreoEssentials/chat-messaging/chat-format.yml
# Death messages are configured in: plugins/OreoEssentials/chat-messaging/death-messages.yml
# Death messages are configured in: plugins/OreoEssentials/chat-messaging/death-messages.yml

# Economy messages
messages:
  pay-sent: "You have paid {receiver} {amount} USD!"
  pay-received: "{sender} has paid you {amount} USD!"
  money-admin: "You have been given {amount} USD!"
  money-paid: "{sender} has paid you {amount} USD!"
  cheque-created: "You have created a cheque for {amount} USD!"
  cheque-redeemed: "You have redeemed a cheque for {amount} USD!"


# ==================== MIGRATION & COMPATIBILITY ( BETA MODE  !!!! THIS IS STILL IN TESTING MODE!!!) ====================

# zEssentials migration
# Use /zimport [homes|warps|economy|all]  (or the legacy /importzhomes for homes only)
zessentials-migration:
  enabled: true
  jdbc-url: "jdbc:sqlite:plugins/zEssentials/data.db"
  user: ""
  password: ""
  table-prefix: "zessentials_"

  # Which economy_name to pull from the zessentials_economies table.
  # Check your zEssentials economy/config.yml — default is "money".
  economy-name: "money"

  # What to do when a record already exists in OreoEssentials:
  #   skip      – leave the existing data untouched
  #   overwrite – replace it with the zEssentials value
  on-conflict: "skip"

  # Fallback path for warp data (used when the storages SQL table has no warp row).
  # zEssentials persists ConfigStorage (which holds all warps) to this JSON file.
  # Relative paths are resolved from the server root directory.
  warp-json-path: "plugins/zEssentials/config_storage.json"

# EssentialsX migration
# Set enabled: true, run /migrateessentials, then set back to false.
# Works with all OreoEssentials storage backends: yaml, json, mongodb.
essentialsx-migration:
  enabled: false

  # Path to the EssentialsX plugin folder.
  # Relative paths are resolved from the server root (where server.jar is).
  data-path: "plugins/Essentials"

  # Choose which data types to import when running /migrateessentials all
  import:
    homes: true
    warps: true
    economy: true

  # What to do when an OreoEssentials record already exists for that player/warp:
  #   skip      – leave the existing OreoEssentials data untouched
  #   overwrite – replace it with the EssentialsX value
  on-conflict: "skip"
