# ============================================================
#  Daily Rotating Shop — Example
#  8 items configured; only 4 are shown each day.
#  Selection persists across restarts and rerolls at 00:00.
# ============================================================

shop-id: daily_shop
title: "&5&l✦ Daily Shop &8[&d{day}&8]"
rows: 6
pages: 1
# currency: tokens   # uncomment to use a custom currency instead of Vault
hide-back-button: true

# ── Rotation settings ────────────────────────────────────────
rotating:
  enabled: true
  display-count: 4       # how many of the 8 items to show each day
  reset: daily           # informational label (only daily is implemented)
  reset-time: "00:00"    # HH:mm — when the new selection is drawn
  timezone: "Europe/Paris"

# ── Item pool (8 items) ──────────────────────────────────────
# Each item defines its own slot and page.
# On any given day, only display-count items will be visible.
items:

  diamond_sword:
    material: DIAMOND_SWORD
    name: "&b&lSharp Diamond Sword"
    lore:
      - "&7A finely crafted sword."
      - "&7Changes daily!"
    buy-price: 750.0
    sell-price: 300.0
    amount: 1
    slot: 10
    page: 1
    enchantments:
      sharpness: 3
      unbreaking: 2

  netherite_pickaxe:
