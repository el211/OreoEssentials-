# ── Amount Selection ──────────────────────────────────
amount-selection:
  enabled: true

# ── GUI Navigation ────────────────────────────────────
gui:
  previous-page-slot: 45
  next-page-slot: 53
  back-button-slot: 49

# ── Logging ───────────────────────────────────────────
logging:
  enabled: true
  log-file: "shop/transactions.log"
  log-format: "[{date}] {player} {action} x{amount} {item} for {price} ({economy})"

# ── Dynamic Pricing ───────────────────────────────────
dynamic-pricing:
  enabled: true
  demand-scale: 500.0
  max-buy-multiplier: 3.0
  min-sell-multiplier: 0.2
  decay-interval-minutes: 60
  decay-rate: 0.05
  save-interval-minutes: 5
  show-trend-in-lore: true