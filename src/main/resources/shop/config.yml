# ─────────────────────────────────────────────────────
#  OreoEssentials · Shop Module · config.yml
#  Location: plugins/OreoEssentials/shop/config.yml
# ─────────────────────────────────────────────────────
enabled: true

# ── Shop file deployment ───────────────────────────────
# false (default): bundled shop YMLs are only created the very first time
#                  (when the shops/ folder doesn't exist yet).
#                  Deleting a shop file will NOT restore it on restart.
# true:            any bundled shop YAML that is missing will be re-created
#                  on every startup. Useful if you accidentally deleted one.
auto-deploy-missing-shops: false

# ── Language ──────────────────────────────────────────
# Supported: en, fr  (add more in messages.yml)
language: en

# ── Economy ───────────────────────────────────────────
economy:
  currency-symbol: "$"

# ── Anti-Dupe Protection ──────────────────────────────
anti-dupe:
  enabled: true
  transaction-cooldown-ms: 300
  verify-inventory: true
  log-suspicious: true
  max-transactions-per-second: 5
  lock-during-transaction: true

# ── Main Menu ─────────────────────────────────────────
main-menu:
  title: "&8&lOSHOP &r&6&lGUI"
  rows: 6
  fill-empty-slots: true
  fill-material: "BLACK_STAINED_GLASS_PANE"
  close-slot: 49

# ── Main Menu Category Buttons ────────────────────────
# slot:   inventory slot 0-53 (avoid 45-53, that's the nav bar)
# shop:   must match shop-id in shops/*.yml
