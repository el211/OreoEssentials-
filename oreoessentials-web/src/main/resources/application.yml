spring:
  application:
    name: oreoessentials-web

  # ─── Central PostgreSQL (web panel's own data) ─────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oreoessentials_web}
    username: ${DB_USERNAME:oreo}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Use Flyway/Liquibase in prod; 'update' for dev
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

# ─── Server ────────────────────────────────────────────────────────────────
server:
  port: ${PORT:19150}
  servlet:
    context-path: /
  error:
    include-message: never         # Never expose raw exception messages to clients

# ─── JWT ───────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_THIS_IS_A_256_BIT_SECRET_KEY_FOR_DEV_ONLY_DO_NOT_USE_IN_PROD}
    access-token-expiration-ms: 900000       # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days

  # ─── Encryption (AES-256-GCM for MongoDB URIs stored in DB) ──────────────
  encryption:
    secret-key: ${ENCRYPTION_KEY:CHANGE_ME_32_BYTE_KEY_FOR_DEV_00}  # exactly 32 chars / 256 bits

  # ─── CORS (adjust to your frontend origin) ───────────────────────────────
  cors:
    allowed-origins: ${CORS_ORIGINS:http://88.99.150.35:19149}

  # ─── MongoDB connection pool (per server instance) ───────────────────────
  mongo:
    connect-timeout-ms: 5000
    socket-timeout-ms: 10000
    max-pool-size: 3              # per external server connection

# ─── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ─── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    fr.elias.oreoessentialsweb: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
