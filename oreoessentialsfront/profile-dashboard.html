<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Profile Dashboard — OreoEssentials</title>
  <meta name="description" content="Manage your OreoEssentials profile and in-game data."/>
  
  <link rel="icon" type="image/png" href="/logo.png" sizes="256x256"/>
  <link rel="stylesheet" href="/styles.css"/>
  
  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 90px 22px 64px;
    }
    
    .profile-header {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.14)),
                 radial-gradient(120% 140% at 15% 10%, rgba(79,166,242,.16), transparent 55%),
                 linear-gradient(180deg, #0b1033, #070a22);
      border: 1px solid #ffffff14;
      border-radius: 18px;
      padding: 30px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2260d8, #4fa6f2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: white;
    }
    
    .profile-info h1 {
      margin: 0 0 5px;
      font-size: 28px;
    }
    
    .profile-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 999px;
      color: #22c55e;
      font-size: 13px;
    }
    
    .profile-status.offline {
      background: rgba(156, 163, 175, 0.1);
      border-color: rgba(156, 163, 175, 0.3);
      color: #9ca3af;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.14)),
                 linear-gradient(180deg, #0b1033, #070a22);
      border: 1px solid #ffffff14;
      border-radius: 18px;
      padding: 24px;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px #00000055;
    }
    
    .stat-card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(135deg, #2260d8, #4fa6f2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .section {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.14)),
                 linear-gradient(180deg, #0b1033, #070a22);
      border: 1px solid #ffffff14;
      border-radius: 18px;
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .section h2 {
      margin: 0 0 20px;
      font-size: 22px;
    }
    
    .currency-list {
      display: grid;
      gap: 12px;
    }
    
    .currency-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid #ffffff0a;
      border-radius: 12px;
    }
    
    .currency-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    
    .currency-symbol {
      font-size: 20px;
    }
    
    .currency-balance {
      font-size: 18px;
      font-weight: bold;
      color: #4fa6f2;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(79, 166, 242, 0.2);
      border-top-color: #4fa6f2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: all .2s ease;
    }
    
    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      transform: translateY(-2px);
    }
    
    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  
  <button class="logout-btn" onclick="logout()">Logout</button>
  
  <div class="dashboard-container">
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Loading your profile...</p>
    </div>
    
    <div id="dashboard" style="display: none;">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar" id="avatar"></div>
        <div class="profile-info">
          <h1 id="playerName">Loading...</h1>
          <span class="profile-status" id="status">
            <span>●</span>
            <span id="statusText">Checking...</span>
          </span>
        </div>
      </div>
      
      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Vault Balance</h3>
          <div class="value" id="vaultBalance">$0.00</div>
        </div>
        
        <div class="stat-card">
          <h3>Playtime</h3>
          <div class="value" id="playtime">0h 0m</div>
        </div>
        
        <div class="stat-card">
          <h3>Homes</h3>
          <div class="value" id="homesCount">0</div>
        </div>
        
        <div class="stat-card">
          <h3>Login Count</h3>
          <div class="value" id="loginCount">0</div>
        </div>
      </div>
      
      <!-- Custom Currencies -->
      <div class="section" id="currenciesSection" style="display: none;">
        <h2>Custom Currencies</h2>
        <div class="currency-list" id="currencyList"></div>
      </div>
      
      <!-- Account Info -->
      <div class="section">
        <h2>Account Information</h2>
        <div style="display: grid; gap: 12px;">
          <div style="padding: 12px; background: rgba(255,255,255,.03); border-radius: 10px;">
            <div style="color: var(--muted); font-size: 13px; margin-bottom: 4px;">UUID</div>
            <div style="font-family: monospace;" id="uuid">-</div>
          </div>
          <div style="padding: 12px; background: rgba(255,255,255,.03); border-radius: 10px;">
            <div style="color: var(--muted); font-size: 13px; margin-bottom: 4px;">Username</div>
            <div id="username">-</div>
          </div>
          <div style="padding: 12px; background: rgba(255,255,255,.03); border-radius: 10px;">
            <div style="color: var(--muted); font-size: 13px; margin-bottom: 4px;">Account Created</div>
            <div id="createdAt">-</div>
          </div>
          <div style="padding: 12px; background: rgba(255,255,255,.03); border-radius: 10px;">
            <div style="color: var(--muted); font-size: 13px; margin-bottom: 4px;">Last Login</div>
            <div id="lastLogin">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Starfield (same as login page)
    (function() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const stars = [];
      for (let i = 0; i < 200; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.5,
          opacity: Math.random(),
          speed: Math.random() * 0.5
        });
      }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
          ctx.fill();
          star.opacity += star.speed;
          if (star.opacity > 1 || star.opacity < 0) star.speed = -star.speed;
        });
        requestAnimationFrame(animate);
      }
      animate();
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    })();
    
    // Dashboard logic
    const token = localStorage.getItem('oe_token');
    
    if (!token) {
      window.location.href = '/profile';
      throw new Error('Not authenticated');
    }
    
    async function loadProfile() {
      try {
        const response = await fetch('/api/profile', {
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            logout();
            return;
          }
          throw new Error('Failed to load profile');
        }
        
        const data = await response.json();
        displayProfile(data);
        
      } catch (error) {
        console.error('Error loading profile:', error);
        document.getElementById('loading').innerHTML = 
          '<p style="color: #ef4444;">Failed to load profile. Please try again.</p>';
      }
    }
    
    function displayProfile(data) {
      // Hide loading, show dashboard
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      
      // Profile header
      document.getElementById('playerName').textContent = data.playerName;
      document.getElementById('avatar').textContent = data.playerName.charAt(0).toUpperCase();
      
      // Online status
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      if (data.online) {
        statusEl.classList.remove('offline');
        statusText.textContent = 'Online';
      } else {
        statusEl.classList.add('offline');
        statusText.textContent = 'Offline';
      }
      
      // Stats
      document.getElementById('vaultBalance').textContent = 
        data.vaultBalance ? '$' + data.vaultBalance.toFixed(2) : '$0.00';
      document.getElementById('playtime').textContent = 
        data.playtimeFormatted || '0h 0m';
      document.getElementById('homesCount').textContent = 
        data.homesCount || 0;
      document.getElementById('loginCount').textContent = 
        data.loginCount || 0;
      
      // Custom currencies
      if (data.currencies && Object.keys(data.currencies).length > 0) {
        document.getElementById('currenciesSection').style.display = 'block';
        const currencyList = document.getElementById('currencyList');
        currencyList.innerHTML = '';
        
        for (const [id, currency] of Object.entries(data.currencies)) {
          const item = document.createElement('div');
          item.className = 'currency-item';
          item.innerHTML = `
            <div class="currency-name">
              <span class="currency-symbol">${currency.symbol}</span>
              <span>${id}</span>
            </div>
            <div class="currency-balance">${currency.formatted}</div>
          `;
          currencyList.appendChild(item);
        }
      }
      
      // Account info
      document.getElementById('uuid').textContent = data.uuid;
      document.getElementById('username').textContent = data.username;
      document.getElementById('createdAt').textContent = 
        formatDate(data.createdAt);
      document.getElementById('lastLogin').textContent = 
        data.lastLogin ? formatDate(data.lastLogin) : 'Never';
    }
    
    function formatDate(isoString) {
      if (!isoString) return '-';
      const date = new Date(isoString);
      return date.toLocaleString();
    }
    
    function logout() {
      localStorage.removeItem('oe_token');
      localStorage.removeItem('oe_username');
      window.location.href = '/profile';
    }
    
    // Load profile on page load
    loadProfile();
  </script>
</body>
</html>
