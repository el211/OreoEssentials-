<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>OreoEssentials — Web Profile Login</title>
  <meta name="description" content="Access your OreoEssentials profile and manage your in-game data from the web."/>
  
  <link rel="icon" type="image/png" href="/logo.png" sizes="256x256"/>
  <link rel="stylesheet" href="/styles.css"/>
  
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-box {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.14)),
                 radial-gradient(120% 140% at 15% 10%, rgba(79,166,242,.16), transparent 55%),
                 linear-gradient(180deg, #0b1033, #070a22);
      border: 1px solid #ffffff14;
      border-radius: 18px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 18px 60px #00000055, 0 10px 30px #00000040;
    }
    
    .login-box h1 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 28px;
      background: linear-gradient(135deg, #2260d8 0%, #3695f6 45%, #4fa6f2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .login-box p {
      text-align: center;
      color: var(--muted);
      margin: 0 0 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--fg);
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid #ffffff1a;
      border-radius: 10px;
      color: var(--fg);
      font-size: 15px;
      transition: all .2s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #4fa6f2;
      background: rgba(255,255,255,.08);
    }
    
    .form-group input::placeholder {
      color: var(--muted);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2260d8 0%, #3695f6 45%, #4fa6f2 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px #2260d855;
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .help-text {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ffffff12;
      color: var(--muted);
      font-size: 14px;
    }
    
    .help-text a {
      color: #4fa6f2;
      text-decoration: none;
    }
    
    .help-text a:hover {
      text-decoration: underline;
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo-container img {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 0 18px #4fa6f233);
    }
  </style>
</head>

<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  
  <div class="login-container">
    <div class="login-box">
      <div class="logo-container">
        <img src="/logo.png" alt="OreoEssentials" />
      </div>
      
      <h1>Web Profile Login</h1>
      <p>Access your OreoEssentials profile</p>
      
      <div id="error" class="error-message"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="your_username_XXXX"
            required
            autocomplete="username"
          />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">
          Login to Profile
        </button>
      </form>
      
      <div class="help-text">
        Don't have an account?<br>
        Use <code>/oecreate profile</code> in-game
      </div>
    </div>
  </div>
  
  <script>
    // Starfield animation
    (function() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const stars = [];
      const numStars = 200;
      
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.5,
          opacity: Math.random(),
          speed: Math.random() * 0.5
        });
      }
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        stars.forEach(star => {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
          ctx.fill();
          
          star.opacity += star.speed;
          if (star.opacity > 1 || star.opacity < 0) {
            star.speed = -star.speed;
          }
        });
        
        requestAnimationFrame(animate);
      }
      
      animate();
      
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    })();
    
    // Login form handling
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('error');
    const loginBtn = document.getElementById('loginBtn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // Clear previous errors
      errorDiv.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Store session token
          localStorage.setItem('oe_token', data.token);
          localStorage.setItem('oe_username', username);
          
          // Redirect to profile
          window.location.href = '/profile/dashboard';
        } else {
          showError(data.message || 'Invalid username or password');
        }
      } catch (error) {
        showError('Connection error. Please try again.');
        console.error('Login error:', error);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login to Profile';
      }
    });
    
    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
    
    // Check if already logged in
    const token = localStorage.getItem('oe_token');
    if (token) {
      // Verify token is still valid
      fetch('/api/verify', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      }).then(res => {
        if (res.ok) {
          window.location.href = '/profile/dashboard';
        } else {
          localStorage.removeItem('oe_token');
          localStorage.removeItem('oe_username');
        }
      });
    }
  </script>
</body>
</html>
